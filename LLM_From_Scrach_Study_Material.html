<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformers From Scratch — An Interactive Course</title>
<style>
/* ============================================================
   THEME — "Ink Notebook": deep charcoal-blue, amber + teal ink
   No external fonts/libs. System stacks only. Runs offline.
   ============================================================ */
:root{
  --bg:#0c0e14;
  --bg2:#11141d;
  --panel:#161a26;
  --panel2:#1c2130;
  --line:#262d40;
  --line2:#323b54;
  --ink:#e7e3d8;            /* warm paper-ink text */
  --ink-dim:#a7a899;
  --ink-faint:#6f7382;
  --amber:#f2a65a;          /* primary accent */
  --amber-soft:#f7c489;
  --teal:#5eead4;           /* secondary accent */
  --teal-dim:#2f8f81;
  --violet:#9aa6ff;         /* used sparingly for K vectors etc */
  --rose:#ff6b81;           /* masks / warnings */
  --green:#7ee787;
  --grid:#1a1f2e;
  --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
  --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  --mono: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, 'Liberation Mono', monospace;
  --shadow: 0 18px 50px -20px rgba(0,0,0,.8);
  --radius:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:var(--serif);
  background:
    radial-gradient(900px 600px at 85% -5%, rgba(242,166,90,.06), transparent 60%),
    radial-gradient(700px 500px at -5% 10%, rgba(94,234,212,.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
/* faint grain/texture */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.035;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
a{color:var(--teal);text-decoration:none}
a:hover{text-decoration:underline}

/* ---------- Layout ---------- */
#app{display:flex;min-height:100vh;position:relative;z-index:1}
#sidebar{
  width:300px;flex:0 0 300px;position:sticky;top:0;align-self:flex-start;
  height:100vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg2),var(--bg));
  border-right:1px solid var(--line);padding:22px 16px 60px;
}
#sidebar .brand{font-family:var(--sans);font-weight:800;letter-spacing:.5px;font-size:18px;color:var(--ink);margin:4px 6px 2px}
#sidebar .brand span{color:var(--amber)}
#sidebar .sub{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:0 6px 16px;letter-spacing:.4px}
.progress-wrap{margin:0 6px 18px}
.progress-track{height:7px;background:var(--panel2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--amber));transition:width .5s ease}
.progress-label{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:6px;display:flex;justify-content:space-between}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;cursor:pointer;
  font-family:var(--sans);font-size:13.5px;color:var(--ink-dim);margin:2px 0;border:1px solid transparent;
  transition:all .15s;user-select:none;
}
.nav-item:hover{background:var(--panel);color:var(--ink)}
.nav-item.active{background:linear-gradient(90deg,rgba(242,166,90,.16),rgba(242,166,90,.02));color:var(--amber-soft);border-color:rgba(242,166,90,.25)}
.nav-item .num{font-family:var(--mono);font-size:11px;color:var(--ink-faint);min-width:22px}
.nav-item.active .num{color:var(--amber)}
.nav-item .check{margin-left:auto;font-size:12px;color:var(--green);opacity:0;transition:opacity .2s}
.nav-item.done .check{opacity:1}
.nav-sec{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);margin:18px 12px 6px}

/* ---------- Main ---------- */
#main{flex:1;min-width:0;max-width:980px;margin:0 auto;padding:46px 48px 140px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kicker{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--amber)}
h1.module-title{font-family:var(--sans);font-weight:800;font-size:40px;line-height:1.1;margin:6px 0 4px;letter-spacing:-.5px}
.module-tag{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
.lead{font-size:18.5px;color:var(--ink-dim);margin:14px 0 30px;max-width:70ch}

h2.step{
  font-family:var(--sans);font-weight:700;font-size:22px;margin:42px 0 14px;
  display:flex;align-items:center;gap:12px;letter-spacing:-.2px;
}
h2.step .badge{
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--bg);
  background:var(--teal);padding:3px 9px;border-radius:99px;letter-spacing:.5px;flex:0 0 auto;
}
h2.step.intuition .badge{background:var(--teal)}
h2.step.visual .badge{background:var(--amber)}
h2.step.math .badge{background:var(--violet)}
h2.step.dims .badge{background:#7dd3fc}
h2.step.numeric .badge{background:var(--green)}
h2.step.code .badge{background:#c0a4ff}
h2.step.quiz .badge{background:#ffd166}
h2.step.mistakes .badge{background:var(--rose)}
h3{font-family:var(--sans);font-weight:700;font-size:17px;margin:26px 0 8px;color:var(--ink)}
p{margin:12px 0;max-width:72ch}
.note{font-family:var(--sans);font-size:14.5px;color:var(--ink-dim)}
ul,ol{max-width:72ch;padding-left:22px}
li{margin:6px 0}
strong{color:var(--amber-soft);font-weight:700}
em.key{font-style:normal;color:var(--teal);font-weight:600}

/* cards / callouts */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin:18px 0;box-shadow:var(--shadow)}
.callout{border-left:3px solid var(--teal);background:linear-gradient(90deg,rgba(94,234,212,.07),transparent);padding:14px 18px;border-radius:0 10px 10px 0;margin:18px 0;font-size:15px}
.callout.warn{border-color:var(--rose);background:linear-gradient(90deg,rgba(255,107,129,.08),transparent)}
.callout.idea{border-color:var(--amber)}
.callout .h{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--teal);display:block;margin-bottom:4px}
.callout.warn .h{color:var(--rose)}
.callout.idea .h{color:var(--amber)}

/* math */
.eq{font-family:var(--mono);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin:14px 0;font-size:16px;color:var(--ink);overflow-x:auto;white-space:nowrap}
.eq .op{color:var(--amber)}
.eq .v{color:var(--teal)}
.eq .small{color:var(--ink-faint);font-size:13px}
.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 4px}
.frac .top{border-bottom:1.5px solid var(--ink-dim);padding:0 6px}
.frac .bot{padding:0 6px}
sub,sup{font-size:.72em}

/* tables */
table{border-collapse:collapse;width:100%;margin:16px 0;font-family:var(--mono);font-size:13px}
th,td{border:1px solid var(--line);padding:8px 12px;text-align:left}
th{background:var(--panel2);color:var(--amber-soft);font-weight:700;letter-spacing:.3px}
td{color:var(--ink-dim)}
tr:nth-child(even) td{background:rgba(255,255,255,.012)}

/* code blocks */
.code-block{background:#0a0c12;border:1px solid var(--line);border-radius:12px;margin:16px 0;overflow:hidden}
.code-head{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--panel2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
.code-head .dot{width:11px;height:11px;border-radius:50%}
.code-head .fname{margin-left:6px;color:var(--ink-faint)}
.code-head .toggle{margin-left:auto;cursor:pointer;color:var(--amber);font-size:11px;border:1px solid var(--line2);padding:3px 9px;border-radius:6px;user-select:none}
.code-head .toggle:hover{background:var(--panel)}
pre{margin:0;padding:16px 18px;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.7;tab-size:4}
pre.collapsed{display:none}
code{font-family:var(--mono)}
/* python syntax colors */
.tok-kw{color:#ff9d7a}.tok-def{color:#7dd3fc}.tok-str{color:#9fe88d}.tok-num{color:#f2c879}
.tok-com{color:#566080;font-style:italic}.tok-fn{color:#c0a4ff}.tok-self{color:#f08eb0}
.tok-op{color:var(--ink-dim)}.tok-builtin{color:#5eead4}
.line-note{color:var(--ink-faint);font-style:italic}
.explain-row{display:grid;grid-template-columns:1fr;gap:6px;margin:10px 0}
.explain-row .ln{font-family:var(--mono);font-size:12.5px;background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--teal);padding:8px 12px;border-radius:0 8px 8px 0}
.explain-row .ln b{color:var(--amber-soft)}

/* generic interactive controls */
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin:14px 0}
.control{display:flex;flex-direction:column;gap:5px;font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)}
.control label{letter-spacing:.4px}
input[type=range]{-webkit-appearance:none;appearance:none;width:160px;height:5px;border-radius:99px;background:var(--line2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--amber);cursor:pointer;border:2px solid var(--bg)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--amber);cursor:pointer;border:2px solid var(--bg)}
.control .val{color:var(--teal);font-size:13px}
.btn{font-family:var(--sans);font-weight:600;font-size:13.5px;background:var(--amber);color:#1a1206;border:none;padding:9px 18px;border-radius:9px;cursor:pointer;transition:transform .1s,filter .15s}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--ink)}
.btn.ghost:hover{background:var(--panel)}
.btn.teal{background:var(--teal);color:#06231f}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}

/* matrix display */
.matrix-stage{display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:center;margin:18px 0}
.mat{display:inline-block;text-align:center}
.mat .label{font-family:var(--mono);font-size:12px;color:var(--amber-soft);margin-bottom:6px}
.mat .label .shape{color:var(--ink-faint)}
.grid-mat{display:inline-grid;gap:3px;background:var(--line);padding:3px;border-radius:8px}
.cell{font-family:var(--mono);font-size:11px;width:42px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border-radius:4px;color:var(--ink);transition:background .25s,color .25s,transform .15s}
.cell.hl{background:var(--amber);color:#1a1206;transform:scale(1.08)}
.cell.hlk{background:var(--violet);color:#10122a}
.cell.hlv{background:var(--teal);color:#06231f}
.mat-op{font-family:var(--mono);font-size:26px;color:var(--ink-faint)}

/* canvases */
canvas{max-width:100%;border-radius:10px;background:var(--bg2);border:1px solid var(--line);display:block}
.canvas-wrap{margin:16px 0}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);margin:8px 0}
.legend .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px}

/* quiz */
.quiz{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:6px 22px 18px;margin:18px 0}
.q{padding:16px 0;border-bottom:1px solid var(--line)}
.q:last-child{border-bottom:none}
.q .qtext{font-family:var(--sans);font-weight:600;font-size:15.5px;margin-bottom:10px}
.q .qtext .qn{color:var(--amber);font-family:var(--mono);margin-right:8px}
.opt{display:block;font-family:var(--sans);font-size:14.5px;padding:10px 14px;border:1px solid var(--line2);border-radius:9px;margin:7px 0;cursor:pointer;transition:all .15s;color:var(--ink-dim)}
.opt:hover{border-color:var(--amber);color:var(--ink)}
.opt.correct{background:rgba(126,231,135,.13);border-color:var(--green);color:#cdeccf}
.opt.wrong{background:rgba(255,107,129,.12);border-color:var(--rose);color:#f3c9d0}
.opt.chosen{border-width:2px}
.explain{font-family:var(--sans);font-size:13.5px;color:var(--ink-dim);margin-top:10px;padding:10px 14px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--teal);display:none}
.explain.show{display:block}

/* clickable block diagram */
.block-comp{cursor:pointer;transition:all .2s}
.block-comp:hover{filter:brightness(1.25)}
.block-detail{font-family:var(--sans);font-size:14.5px;color:var(--ink-dim);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-top:14px;min-height:40px}
.block-detail b{color:var(--amber-soft)}

/* shape pills */
.shape-pill{display:inline-block;font-family:var(--mono);font-size:12px;background:var(--panel2);border:1px solid var(--line2);border-radius:7px;padding:3px 9px;color:var(--teal);margin:3px 4px}
.shape-flow{display:flex;flex-direction:column;gap:8px;margin:16px 0}
.shape-flow .row{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:12.5px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:10px 14px}
.shape-flow .row .stage{color:var(--amber-soft);min-width:230px}
.shape-flow .row .arrow{color:var(--ink-faint)}
.shape-flow .row .shape{color:var(--teal)}

/* footer nav */
.module-nav{display:flex;justify-content:space-between;margin-top:60px;padding-top:24px;border-top:1px solid var(--line);gap:14px}
.module-nav .btn{flex:0 0 auto}
.mark-done{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:40px}

/* roadmap */
.roadmap{display:flex;flex-direction:column;gap:0;margin:24px 0}
.stage{display:flex;gap:18px;position:relative;padding:0 0 26px 0}
.stage .bullet{flex:0 0 auto;width:44px;height:44px;border-radius:50%;background:var(--panel2);border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;color:var(--amber);z-index:2;transition:all .4s}
.stage.lit .bullet{background:var(--amber);color:#1a1206;border-color:var(--amber);box-shadow:0 0 0 6px rgba(242,166,90,.14)}
.stage .stem{position:absolute;left:21px;top:44px;bottom:0;width:2px;background:var(--line2)}
.stage.lit .stem{background:linear-gradient(180deg,var(--amber),var(--line2))}
.stage:last-child .stem{display:none}
.stage .body{flex:1;padding-top:6px}
.stage .body h4{font-family:var(--sans);margin:0 0 4px;font-size:16.5px;color:var(--ink)}
.stage .body p{margin:2px 0;font-size:14px;color:var(--ink-dim)}

.tag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin:16px 0}
.tag-card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px;transition:all .2s;cursor:default}
.tag-card:hover{border-color:var(--amber);transform:translateY(-2px)}
.tag-card .t{font-family:var(--mono);font-size:13px;color:var(--amber-soft);font-weight:700}
.tag-card .d{font-size:12.5px;color:var(--ink-dim);margin-top:4px;line-height:1.5}

.mobile-toggle{display:none}
@media(max-width:880px){
  #sidebar{position:fixed;left:-310px;z-index:50;transition:left .25s;box-shadow:var(--shadow)}
  #sidebar.open{left:0}
  #main{padding:70px 22px 120px}
  h1.module-title{font-size:30px}
  .mobile-toggle{display:flex;position:fixed;top:14px;left:14px;z-index:60;background:var(--amber);color:#1a1206;border:none;width:42px;height:42px;border-radius:10px;font-size:20px;cursor:pointer;align-items:center;justify-content:center}
}
.hl-pulse{animation:pulse 1.4s ease}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(242,166,90,.5)}100%{box-shadow:0 0 0 18px rgba(242,166,90,0)}}
.fade-in{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<div id="app">
  <aside id="sidebar">
    <div class="brand">Transformers <span>From Scratch</span></div>
    <div class="sub">interactive course · build GPT in PyTorch</div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-label"><span id="progText">0 / 18 complete</span><span id="progPct">0%</span></div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main id="main">
    <div id="content"></div>
    <div class="module-nav">
      <button class="btn ghost" id="prevBtn">← Previous</button>
      <button class="btn" id="nextBtn">Next →</button>
    </div>
  </main>
</div>
<script>
/* ================= CORE FRAMEWORK ================= */
const MODULES = []; // populated by module scripts below
let current = 0;
const State = {
  done: new Set(),
  load(){ try{const d=JSON.parse(localStorage.getItem('tfx_done')||'[]');d.forEach(x=>this.done.add(x));}catch(e){} },
  save(){ try{localStorage.setItem('tfx_done',JSON.stringify([...this.done]));}catch(e){} }
};
State.load();

function buildNav(){
  const nav=document.getElementById('nav');
  let html='';
  let lastSec=null;
  MODULES.forEach((m,i)=>{
    if(m.section!==lastSec){html+=`<div class="nav-sec">${m.section}</div>`;lastSec=m.section;}
    html+=`<div class="nav-item" data-i="${i}">
      <span class="num">${m.num}</span><span>${m.title}</span><span class="check">✓</span></div>`;
  });
  nav.innerHTML=html;
  nav.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click',()=>go(parseInt(el.dataset.i)));
  });
  refreshNav();
}
function refreshNav(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    const i=parseInt(el.dataset.i);
    el.classList.toggle('active',i===current);
    el.classList.toggle('done',State.done.has(MODULES[i].id));
  });
  const total=MODULES.length;
  const pct=Math.round(State.done.size/total*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progText').textContent=`${State.done.size} / ${total} complete`;
  document.getElementById('progPct').textContent=pct+'%';
}
function go(i){
  if(i<0||i>=MODULES.length)return;
  current=i;
  const c=document.getElementById('content');
  c.innerHTML=MODULES[i].render();
  c.classList.remove('fade-in');void c.offsetWidth;c.classList.add('fade-in');
  if(MODULES[i].init)try{MODULES[i].init();}catch(e){console.error('init error',e);}
  highlightAll();
  refreshNav();
  document.getElementById('prevBtn').style.visibility=i===0?'hidden':'visible';
  document.getElementById('nextBtn').textContent=i===MODULES.length-1?'Finish ✓':'Next →';
  window.scrollTo({top:0,behavior:'instant'});
  document.getElementById('sidebar').classList.remove('open');
}
document.getElementById('prevBtn').addEventListener('click',()=>go(current-1));
document.getElementById('nextBtn').addEventListener('click',()=>{markDone(MODULES[current].id);go(Math.min(current+1,MODULES.length-1));});
function markDone(id){State.done.add(id);State.save();refreshNav();}

/* ---------- Python syntax highlighter (no libs) ---------- */
const PY_KW=new Set(['import','from','as','def','class','return','if','elif','else','for','while','in','not','and','or','is','with','lambda','None','True','False','self','super','pass','break','continue','yield','assert','try','except','finally','raise','global','nonlocal','del','print']);
const PY_BUILTIN=new Set(['range','len','enumerate','zip','int','float','str','list','dict','tuple','set','print','sum','min','max','abs','torch','nn','F','math','optim']);
function highlightPython(code){
  // tokenize line by line, comments and strings first
  const out=[];
  const lines=code.split('\n');
  for(let line of lines){
    let res='';let i=0;
    while(i<line.length){
      const rest=line.slice(i);
      // comment
      let m;
      if((m=rest.match(/^#.*/))){res+=`<span class="tok-com">${esc(m[0])}</span>`;i+=m[0].length;continue;}
      // triple/normal strings
      if((m=rest.match(/^(f?"""[\s\S]*?"""|f?'''[\s\S]*?'''|f?"(?:[^"\\]|\\.)*"|f?'(?:[^'\\]|\\.)*')/))){
        res+=`<span class="tok-str">${esc(m[0])}</span>`;i+=m[0].length;continue;}
      // number
      if((m=rest.match(/^\d+\.?\d*(e-?\d+)?/))){res+=`<span class="tok-num">${esc(m[0])}</span>`;i+=m[0].length;continue;}
      // identifier
      if((m=rest.match(/^[A-Za-z_]\w*/))){
        const w=m[0];let cls='';
        if(w==='self')cls='tok-self';

/* heatmap on canvas given 2D array (values 0..1 expected or auto-normalized) */
function drawHeatmap(canvas,data,opts={}){
  const ctx=canvas.getContext('2d');
  const rows=data.length,cols=data[0].length;
  const pad=opts.pad||38;
  const W=canvas.width,H=canvas.height;
  const cw=(W-pad-10)/cols, ch=(H-pad-10)/rows;
  ctx.clearRect(0,0,W,H);
  let mn=Infinity,mx=-Infinity;
  data.forEach(r=>r.forEach(v=>{if(isFinite(v)){mn=Math.min(mn,v);mx=Math.max(mx,v);}}));
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    let v=data[r][c];
    const x=pad+c*cw, y=pad+r*ch;
    if(!isFinite(v)||v===null){ // masked
      ctx.fillStyle='#1c2130';ctx.fillRect(x,y,cw-2,ch-2);
      ctx.strokeStyle='#323b54';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cw-2,y+ch-2);ctx.stroke();
      continue;
    }
    const t=mx>mn?(v-mn)/(mx-mn):0.5;
    // teal->amber colormap
    const col=lerpColor([18,40,46],[242,166,90],t);
    ctx.fillStyle=`rgb(${col[0]},${col[1]},${col[2]})`;
    ctx.fillRect(x,y,cw-2,ch-2);
    ctx.fillStyle=t>0.55?'#1a1206':'#cfe8e0';
    ctx.font='11px ui-monospace,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(v.toFixed(2),x+cw/2,y+ch/2);
  }
  ctx.fillStyle='#a7a899';ctx.font='11px ui-monospace,monospace';
  const rl=opts.rowLabels||[],cl=opts.colLabels||[];
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let r=0;r<rows;r++)if(rl[r])ctx.fillText(rl[r],pad-6,pad+r*ch+ch/2);
  ctx.textAlign='center';ctx.textBaseline='bottom';
  for(let c=0;c<cols;c++)if(cl[c])ctx.fillText(cl[c],pad+c*cw+cw/2,pad-6);
}
function lerpColor(a,b,t){return[a[0]+(b[0]-a[0])*t|0,a[1]+(b[1]-a[1])*t|0,a[2]+(b[2]-a[2])*t|0];}
function softmaxRow(arr){
  const m=Math.max(...arr.filter(isFinite));
  const ex=arr.map(v=>isFinite(v)?Math.exp(v-m):0);
  const s=ex.reduce((a,b)=>a+b,0);
  return ex.map(v=>v/s);
}

MODULES.push({
id:'m0',num:'0',section:'Foundations',title:'Why Transformers Exist',
render(){return header('0','Why Transformers Exist',
  'RNNs · LSTMs · parallelization · long-range dependencies',
  'Before attention, sequence models read text one word at a time, like reading through a straw. This module shows exactly why that hurt, and why letting every token look at every other token all at once changed everything.')
+ step('intuition',`
<p>Imagine reading a 1,000-word essay but only being allowed to remember a single sticky note as you go. After each word you rewrite the note, then throw the word away. By the end, the opening sentence survives only as a faint smudge on that note. That smudge is the <em class="key">hidden state</em> of a Recurrent Neural Network (RNN).</p>
<p>RNNs process a sequence <strong>step by step</strong>: hidden state <code>h₁ → h₂ → h₃ → …</code>. Each new word updates the note. Three structural problems follow directly from this design:</p>
<ul>
<li><strong>Sequential bottleneck</strong> — word <em>t</em> cannot be computed until word <em>t−1</em> finishes. No parallelism, so training on long sequences is slow.</li>
<li><strong>Vanishing/exploding gradients</strong> — to learn that word 1 matters for word 1000, the gradient must survive ~1000 multiplications. It shrinks to nothing (vanishes) or blows up.</li>
<li><strong>Information squeeze</strong> — the entire past is crammed into one fixed-size vector. Early information is steadily overwritten.</li>
</ul>
<p>LSTMs and GRUs add gates that <em>protect</em> the note (a "cell state" with learned forget/input gates). This stretches usable memory from ~10 to maybe ~100+ steps, and it dampens vanishing gradients. But the core flaw remains: <strong>computation is still sequential, and distant tokens still communicate only by relaying through every token in between</strong>.</p>
<div class="callout idea"><span class="h">The Transformer's bet</span>Delete recurrence entirely. Let every token directly look at every other token in <em>one</em> parallel operation called <strong>self-attention</strong>. Distance between token 1 and token 1000 becomes a single hop, not 999.</div>`)
+ step('visual',`
<p>Watch information travel. <strong>Top:</strong> an RNN relays a signal hop-by-hop — the influence of token 0 fades as it passes through each hidden state. <strong>Bottom:</strong> a Transformer connects every token to every other token simultaneously, in one shot.</p>
<div class="canvas-wrap"><canvas id="rnnCanvas" width="900" height="340"></canvas></div>
<div class="btn-row"><button class="btn" id="rnnPlay">▶ Play animation</button><button class="btn ghost" id="rnnReset">Reset</button></div>
<div class="legend"><span><span class="sw" style="background:#5eead4"></span>token / hidden state</span><span><span class="sw" style="background:#f2a65a"></span>active signal path</span><span><span class="sw" style="background:#6f7382"></span>weak / faded influence</span></div>`)
+ step('math',`
<p>An RNN defines the hidden state recursively:</p>
<div class="eq">h<sub>t</sub> <span class="op">=</span> tanh( <span class="v">W<sub>h</sub></span> h<sub>t-1</sub> <span class="op">+</span> <span class="v">W<sub>x</sub></span> x<sub>t</sub> <span class="op">+</span> b )</div>
<p>The dependence of the loss on an early input passes through a product of Jacobians:</p>
<div class="eq"><span class="frac"><span class="top">∂h<sub>t</sub></span><span class="bot">∂h<sub>k</sub></span></span> <span class="op">=</span> ∏<span class="small">(k&lt;i≤t)</span> <span class="frac"><span class="top">∂h<sub>i</sub></span><span class="bot">∂h<sub>i-1</sub></span></span></div>
<p>If the typical factor has magnitude <code>&lt; 1</code>, this product decays exponentially in <code>(t−k)</code> → <strong>vanishing gradient</strong>. If <code>&gt; 1</code>, it explodes. Self-attention replaces this chain with a <em>direct</em> weighted sum, so the path length between any two positions is <strong>O(1)</strong> instead of <strong>O(distance)</strong>.</p>
<table><tr><th>Property</th><th>RNN / LSTM</th><th>Transformer (self-attention)</th></tr>
<tr><td>Path length between distant tokens</td><td>O(n)</td><td>O(1)</td></tr>
<tr><td>Sequential operations</td><td>O(n)</td><td>O(1) — fully parallel</td></tr>
<tr><td>Compute per layer</td><td>O(n·d²)</td><td>O(n²·d)</td></tr>
<tr><td>Parallelizable over sequence?</td><td>No</td><td>Yes</td></tr></table>
<p>The Transformer trades cheaper-but-serial work for more-but-parallel work. On modern GPUs, "parallel" wins decisively — even though it costs O(n²) compute, you do it all at once.</p>`)
+ step('dims',`
<p>For a sequence of length <code>n</code> with model dimension <code>d</code>:</p>
<div class="shape-flow">
${shapeRow('RNN: process tokens','one h-vector reused → [d] at each of n steps (serial)')}
${shapeRow('Transformer: input','X = [n, d] — all tokens stacked, processed together')}
${shapeRow('Attention scores','QKᵀ = [n, n] — every token vs every token')}
</div>
<p>That <span class="shape-pill">[n, n]</span> matrix is the whole point: it is the explicit, learnable map of "who looks at whom".</p>`)
+ step('numeric',`
<p>Take 3 tokens. In an RNN, token 3's representation depends on token 1 only through <code>h₁→h₂→h₃</code> — two hops, two chances to forget. In attention, token 3 forms a weighted average:</p>
<div class="eq">out<sub>3</sub> <span class="op">=</span> 0.6·v<sub>1</sub> <span class="op">+</span> 0.1·v<sub>2</sub> <span class="op">+</span> 0.3·v<sub>3</sub></div>
<p>If token 1 matters most, attention can simply assign it weight <code>0.6</code> — directly, no relay. The model <em>learns</em> these weights from data.</p>`)
+ step('code',`
<p>A minimal RNN cell vs. the one-liner that is the heart of attention — note the absence of any loop over time in the second.</p>
${codeBlock('rnn_vs_attention.py',
`import torch, torch.nn.functional as F

# ---- RNN: a Python loop over time (sequential) ----
def rnn(X, Wx, Wh, b):                  # X: [n, d]
    h = torch.zeros(Wh.shape[0])
    outs = []
    for t in range(X.shape[0]):         # <- cannot parallelize this
        h = torch.tanh(Wx @ X[t] + Wh @ h + b)
        outs.append(h)
    return torch.stack(outs)            # [n, d]

# ---- Attention: no time loop, one matmul does all tokens ----
def attention(Q, K, V):                 # each [n, d]
    scores = Q @ K.transpose(-2, -1)    # [n, n]  every token vs every token
    weights = F.softmax(scores / Q.shape[-1] ** 0.5, dim=-1)
    return weights @ V                  # [n, d]  parallel over all positions`)}`)
+ step('quiz',quizBlock([
  {q:'What is the main reason RNNs are hard to parallelize during training?',
   opts:['They use too much memory','Hidden state h<sub>t</sub> depends on h<sub>t−1</sub>, forcing sequential computation','Softmax is expensive','They have too many parameters'],

init(){

  const ctx=cv.getContext('2d');const N=6;let t=0,playing=false,raf=null;
  const xs=[];for(let i=0;i<N;i++)xs.push(120+i*120);
  const yTop=110,yBot=250;
  function node(x,y,label,alpha=1,fill='#5eead4'){
    ctx.globalAlpha=alpha;ctx.beginPath();ctx.arc(x,y,20,0,7);ctx.fillStyle=fill;ctx.fill();
    ctx.globalAlpha=1;ctx.fillStyle='#0c0e14';ctx.font='bold 13px ui-monospace,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x,y);
  }
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);

    ctx.fillText('RNN — signal relays hop by hop, fading',24,40);
    ctx.fillText('Transformer — every token connects directly, at once',24,196);
    // RNN top: chain
    for(let i=0;i<N-1;i++){

      ctx.lineWidth=active?3:1.5;ctx.beginPath();ctx.moveTo(xs[i]+20,yTop);ctx.lineTo(xs[i+1]-20,yTop);ctx.stroke();
    }
    for(let i=0;i<N;i++){

MODULES.push({

render(){return header('4','Self-Attention',

<p>Think of a library. A token has a <em class="key">Query</em>: "I'm a verb, I need my subject." Every other token advertises a <em class="key">Key</em>: "I'm a noun," "I'm a determiner." The query is compared against all keys — high match = high attention. Then the token pulls in the <em class="key">Value</em> (the actual content) of whoever matched, weighted by how well they matched.</p>
<p>Crucially, Q, K, and V are all <strong>learned linear projections of the same input</strong> X. That's why it's <em>self</em>-attention: the sequence attends to itself. The model learns three weight matrices that decide what counts as a good question, a good label, and useful content.</p>
<div class="callout idea"><span class="h">One sentence</span><strong>Attention(Q,K,V) = softmax(QKᵀ / √d<sub>k</sub>) · V</strong> — compute pairwise match scores, scale, normalize to weights, then take a weighted average of the values.</div>`)

<p>The full pipeline for a toy example: <strong>3 tokens</strong>, model dim <strong>d=4</strong>, head dim <strong>d<sub>k</sub>=4</strong>. Step through each stage and watch the attention weights form as a heatmap (row = querying token, column = attended-to token).</p>
<div class="card">
<div id="attStageLabel" style="font-family:var(--mono);color:var(--amber-soft);margin-bottom:10px">Stage 0 — input X</div>
<div id="attMatrices" class="matrix-stage"></div>
<div class="canvas-wrap" id="attHeatWrap" style="display:none;text-align:center"><canvas id="attHeat" width="340" height="300" style="display:inline-block"></canvas></div>
</div>
<div class="btn-row"><button class="btn ghost" id="attPrev">◂ Back</button><button class="btn" id="attNext">Next stage ▸</button><span id="attStepNum" style="font-family:var(--mono);color:var(--ink-faint);align-self:center"></span></div>`)

<p><strong>1. Project</strong> the input X ∈ ℝ<sup>n×d</sup> into queries, keys, values:</p>
<div class="eq">Q <span class="op">=</span> X<span class="v">W<sub>Q</sub></span>,&nbsp;&nbsp; K <span class="op">=</span> X<span class="v">W<sub>K</sub></span>,&nbsp;&nbsp; V <span class="op">=</span> X<span class="v">W<sub>V</sub></span>&nbsp;&nbsp;<span class="small">W<sub>Q</sub>,W<sub>K</sub> ∈ ℝ<sup>d×d<sub>k</sub></sup>,&nbsp; W<sub>V</sub> ∈ ℝ<sup>d×d<sub>v</sub></sup></span></div>
<p><strong>2. Score</strong> every query against every key with a dot product:</p>
<div class="eq">S <span class="op">=</span> Q K<sup>⊤</sup> &nbsp;<span class="small">∈ ℝ<sup>n×n</sup> &nbsp; S<sub>ij</sub> = q<sub>i</sub>·k<sub>j</sub> = "how much token i attends to token j"</span></div>

<div class="eq">A <span class="op">=</span> softmax(S')  <span class="small">row-wise</span></div>
<p><strong>5. Weighted sum</strong> of values:</p>
<div class="eq">Attention <span class="op">=</span> A V <span class="small">∈ ℝ<sup>n×d<sub>v</sub></sup></span></div>

MODULES.push({

render(){return header('7','Layer Normalization',

<p>Then two learnable parameters — <em class="key">γ</em> (scale) and <em class="key">β</em> (shift) — let the network undo or reshape the normalization if that helps. So normalization stabilizes training without forcing the representation into a rigid form.</p>

</div>`)

<p>For a feature vector <code>x ∈ ℝ<sup>d</sup></code> (one token):</p>

${shapeRow('input','[B, n, d]')}
${shapeRow('μ, σ² (over last dim)','[B, n, 1]')}

<li>x̂ = [−3, −1, 1, 3]/2.236 = <strong>[−1.342, −0.447, 0.447, 1.342]</strong></li>

<p>With γ=1, β=0, that's the output. Mean is now 0, variance 1.</p>`)
+ step('code',`
${codeBlock('layernorm.py',
`import torch
import torch.nn as nn

class LayerNorm(nn.Module):
    def __init__(self, d, eps=1e-5):
        super().__init__()
        self.gamma = nn.Parameter(torch.ones(d))    # learnable scale
        self.beta  = nn.Parameter(torch.zeros(d))   # learnable shift
        self.eps = eps

    def forward(self, x):                            # x: [B, n, d]
        mean = x.mean(dim=-1, keepdim=True)          # [B, n, 1]
        var  = x.var(dim=-1, keepdim=True, unbiased=False)
        xhat = (x - mean) / torch.sqrt(var + self.eps)
        return self.gamma * xhat + self.beta

# In practice: nn.LayerNorm(d) does exactly this.`)}

<div class="ln"><b>nn.Parameter</b> — registers γ, β as trainable; they receive gradients like any weight.</div>
</div>`)

   opts:['It is faster on CPU','It is independent of batch size and handles variable-length sequences','It removes the need for attention','It uses fewer parameters than no normalization'],
   a:1,why:'Per-token normalization means behavior doesn\'t change with batch size — ideal for sequences and inference with batch size 1.'}
]))

<div class="callout warn"><span class="h">Mistake</span>Normalizing over the wrong dimension (batch instead of features) — that's BatchNorm behavior and breaks the per-token guarantee.</div>

<div class="callout warn"><span class="h">Mistake</span>Confusing pre-norm vs post-norm placement. Modern GPTs use <em>pre-norm</em> (LayerNorm before the sublayer) for more stable deep training — see Module 10.</div>`);

init(){

MODULES.push({
id:'m8',num:'8',section:'The Block',title:'Residual Connections',
render(){return header('8','Residual Connections',
  'x + f(x) · the gradient highway',
  'Stacking dozens of layers normally makes gradients vanish before they reach the early layers. Residual (skip) connections add the input back to the output, giving gradients a direct path and letting each layer learn only a small correction.')
+ step('intuition',`
<p>Without skips, a 48-layer network forces the gradient to survive 48 multiplications on its way back — it usually decays to nothing, and early layers stop learning. With a residual connection, the layer computes <code>x + f(x)</code> instead of <code>f(x)</code>: the original input is carried forward unchanged.</p>
<p>Two payoffs:</p>
<ul>
<li><strong>Gradient highway</strong> — the <code>+x</code> term means the gradient has a path that is multiplied by 1, so it reaches early layers undiminished.</li>
<li><strong>Easy identity</strong> — if a layer is unhelpful, it can learn <code>f(x)≈0</code> and just pass <code>x</code> through. Each block only needs to learn a <em>residual</em> (a correction), which is easier than learning a full transformation from scratch.</li>
</ul>`)
+ step('visual',`
<p>Toggle residual connections and watch a gradient signal flow backward through 6 stacked layers. Without skips it fades; with skips it stays strong all the way to layer 1.</p>

<div class="canvas-wrap"><canvas id="resCanvas" width="900" height="220"></canvas></div>
<div class="legend"><span><span class="sw" style="background:#f2a65a"></span>strong gradient</span><span><span class="sw" style="background:#39415a"></span>vanished gradient</span><span><span class="sw" style="background:#5eead4"></span>skip path (×1)</span></div>`)
+ step('math',`
<p>A residual sublayer:</p>
<div class="eq">y <span class="op">=</span> x <span class="op">+</span> f(x)</div>
<p>Differentiate w.r.t. x:</p>
<div class="eq"><span class="frac"><span class="top">∂y</span><span class="bot">∂x</span></span> <span class="op">=</span> I <span class="op">+</span> <span class="frac"><span class="top">∂f</span><span class="bot">∂x</span></span></div>
<p>The identity <code>I</code> guarantees the Jacobian never collapses to 0 — even if <code>∂f/∂x</code> is tiny, gradient still flows through the <code>I</code> term. Across L stacked layers, the gradient contains a path of all-ones products instead of a vanishing product of small Jacobians.</p>`)

<div class="shape-flow">
${shapeRow('input x','[B, n, d]')}

${shapeRow('y = x + f(x)','[B, n, d]')}

<p>Suppose x = [1.0, 2.0] and the sublayer outputs f(x) = [0.1, −0.3] (a small correction). Then y = [1.1, 1.7]. If the sublayer learned f(x)=0, y would equal x exactly — the identity. The block only has to learn the <em>delta</em>.</p>`)
+ step('code',`
${codeBlock('residual.py',
`import torch.nn as nn

class Sublayer(nn.Module):
    def __init__(self, d, fn):
        super().__init__()
        self.norm = nn.LayerNorm(d)
        self.fn = fn                      # e.g. attention or MLP

    def forward(self, x):                 # pre-norm residual (GPT style)

#   residual:      x = x + fn(norm(x))    # gradient also flows via +x`)}

   a:1,why:'The "+x" contributes an identity Jacobian, guaranteeing a multiply-by-1 path back to early layers.'},
  {q:'Residual connections let a layer easily learn:',

  {q:'Residual addition requires that x and f(x):',

<p>Attention is great at <em>routing</em> information — deciding which tokens talk to which. But attention is essentially a weighted average; it's a fairly <em>linear</em> mixing operation. To learn rich, nonlinear functions of each token's content, we need something else.</p>
<p>The <strong>feed-forward network</strong> (a 2-layer MLP) runs on each token position independently and identically. It expands the dimension (typically <code>4×</code>: 768 → 3072), applies a nonlinearity (GELU), then contracts back. The wide hidden layer gives the model room to compute complex feature combinations; the nonlinearity is what makes the whole Transformer more than a stack of linear maps.</p>

${codeBlock('feed_forward.py',
`import torch.nn as nn

class FeedForward(nn.Module):

            nn.Linear(d_ff, d),           # contract: [.,4d] -> [.,d]

    def __init__(self, d, d_k):

`class MultiHeadAttention(nn.Module):

        q, k, v = qkv.chunk(3, dim=-1)      # each [B, n, d]

        q = q.view(B, n, self.h, self.d_k).transpose(1, 2)

# and let the model generate the answer.`)}
<p><strong>Supervised fine-tuning training step</strong> (loss masked to the response):</p>
${codeBlock('finetune.py',
`import torch, torch.nn.functional as F

IGNORE = -100   # cross_entropy skips these positions

def make_labels(prompt_ids, response_ids):
    input_ids = prompt_ids + response_ids
    labels    = [IGNORE] * len(prompt_ids) + response_ids[:]  # mask prompt
    return torch.tensor(input_ids), torch.tensor(labels)

model = GPT(**config)            # start from PRETRAINED weights
opt = torch.optim.AdamW(model.parameters(), lr=2e-5)  # small LR!

for batch in dataloader:         # batch: input_ids, labels  [B, n]
    logits, _ = model(batch.input_ids)        # [B, n, V]
    loss = F.cross_entropy(
        logits.view(-1, logits.size(-1)),     # [B*n, V]
        batch.labels.view(-1),                # [B*n]
        ignore_index=IGNORE)                  # prompt tokens excluded
    opt.zero_grad(); loss.backward(); opt.step()`)}
<div class="explain-row">
<div class="ln"><b>IGNORE = -100</b> — the sentinel label value <b>cross_entropy</b> ignores; how we "turn off" prompt tokens.</div>
<div class="ln"><b>labels = [IGNORE]*len(prompt) + response</b> — only response positions get a real target.</div>
<div class="ln"><b>lr = 2e-5</b> — fine-tuning uses a much smaller learning rate than pretraining to avoid wiping out knowledge.</div>
<div class="ln"><b>ignore_index=IGNORE</b> — tells the loss to skip the masked prompt positions automatically.</div>
</div>
<p><strong>LoRA layer concept</strong> — wrap a frozen linear with a trainable low-rank adapter:</p>
${codeBlock('lora.py',
`import torch, torch.nn as nn

class LoRALinear(nn.Module):
    def __init__(self, in_features, out_features, rank=8, alpha=16):
        super().__init__()
        # the original pretrained weight, FROZEN
        self.base = nn.Linear(in_features, out_features)
        self.base.weight.requires_grad = False
        self.base.bias.requires_grad = False
        # small trainable matrices A and B
        self.A = nn.Parameter(torch.randn(rank, in_features) * 0.01)
        self.B = nn.Parameter(torch.zeros(out_features, rank))
        self.scale = alpha / rank

    def forward(self, x):                 # x: [..., in_features]
        base_out = self.base(x)           # frozen path:  W x
        lora_out = (x @ self.A.T) @ self.B.T   # low-rank path: B A x
        return base_out + self.scale * lora_out`)}
<div class="explain-row">
<div class="ln"><b>self.base.weight.requires_grad = False</b> — freeze the pretrained weight; no gradients flow to it.</div>
<div class="ln"><b>self.A = randn(rank, in)*0.01</b>, <b>self.B = zeros(out, rank)</b> — B starts at zero so the adapter initially adds nothing (training begins exactly at the base model).</div>
<div class="ln"><b>(x @ A.T) @ B.T</b> — the cheap low-rank update BAx, computed without ever forming the full d×k matrix.</div>
<div class="ln"><b>base_out + scale·lora_out</b> — frozen output plus the learned correction; only A and B are optimized.</div>
</div>`)
+ step('quiz',quizBlock([
  {q:'In supervised fine-tuning, which tokens contribute to the loss?',
   opts:['All tokens','Only the prompt tokens','Only the response/target tokens','A random subset'],a:2,
   why:'Prompt tokens are masked (label −100); the model is graded only on generating the response.'},
  {q:'What value masks a token from the cross-entropy loss in PyTorch?',
   opts:['0','-1','-100','None'],a:2,
   why:'F.cross_entropy(..., ignore_index=-100) skips positions whose label is −100.'},
  {q:'In LoRA W\' = W + BA, what is trained?',
   opts:['W only','A and B only, W is frozen','All of W, A, B','Nothing'],a:1,
   why:'The base weight W stays frozen; only the small low-rank matrices A and B are updated.'},
  {q:'Why is B initialized to zeros in LoRA?',
   opts:['To save memory','So the adapter contributes nothing at the start (output = base model)','It is required by the math','To freeze it'],a:1,
   why:'With B=0, BA=0, so training begins exactly at the pretrained model and the adapter learns from there.'},
  {q:'Compared to pretraining, fine-tuning typically uses a learning rate that is:',
   opts:['Much larger','About the same','Much smaller','Zero'],a:2,
   why:'A small LR (e.g. 1e-5–3e-5) adapts the model without catastrophically overwriting pretrained knowledge.'}
]))
+ step('mistakes',`
<div class="callout warn"><span class="h">Mistake</span>Computing loss on prompt tokens. Forgetting to mask the prompt (−100) teaches the model to parrot instructions instead of answering them.</div>
<div class="callout warn"><span class="h">Mistake</span>Forgetting the chat template. If training data uses role markers but inference does not (or vice versa), the model behaves erratically.</div>
<div class="callout warn"><span class="h">Mistake</span>Learning rate too high. Large LRs cause "catastrophic forgetting" — the model loses its pretrained abilities.</div>
<div class="callout warn"><span class="h">Mistake</span>Overfitting a tiny dataset. With few examples the model memorizes them; use fewer epochs, regularization, or LoRA.</div>
<div class="callout warn"><span class="h">Mistake</span>Training on bad data. Fine-tuning faithfully copies your data's style and errors — quality matters more than quantity.</div>
<div class="callout warn"><span class="h">Mistake</span>Confusing pretraining with fine-tuning. Pretraining builds general ability from scratch; fine-tuning adapts an existing model.</div>
<div class="callout warn"><span class="h">Mistake</span>Thinking LoRA changes the base weights. It does not — W is frozen; LoRA stores a separate small adapter you can add, swap, or remove.</div>`);
},

  // ---- SFT loss-mask visualization ----
  const cv=document.getElementById('ftMaskCanvas');if(!cv)return;const ctx=cv.getContext('2d');
  const toks=[

  ];
  let show=false;

    ctx.clearRect(0,0,cv.width,cv.height);
    const n=toks.length,gap=8,w=(cv.width-40-gap*(n-1))/n,y=46,h=44;
    toks.forEach((tk,i)=>{
      const x=20+i*(w+gap);
      const isLoss=show&&!tk.p;
      ctx.fillStyle=tk.p?'#161d2c':(show?'#241c10':'#15212a');
      ctx.strokeStyle=isLoss?'#f2a65a':(tk.p?'#39415a':'#5eead4');ctx.lineWidth=isLoss?2.5:1.5;
      ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();
      ctx.fillStyle='#e7e3d8';ctx.font='12px ui-monospace,monospace';ctx.textAlign='center';
      ctx.fillText(tk.t,x+w/2,y+h/2+2);
      // label row
      ctx.font='9.5px ui-monospace,monospace';
      if(show){
        ctx.fillStyle=tk.p?'#6f7382':'#f2a65a';
        ctx.fillText(tk.p?'-100':'loss',x+w/2,y+h+16);
      }
    });
    ctx.fillStyle='#6f7382';ctx.font='11px ui-sans-serif';ctx.textAlign='left';
    ctx.fillText('blue = prompt (conditioning)   teal = response',20,28);
    if(show){ctx.fillStyle='#f2a65a';ctx.textAlign='right';ctx.fillText('amber outline = contributes to loss',cv.width-20,28);}
  }
  draw();
  document.getElementById('ftMaskToggle').onclick=function(){show=!show;this.textContent=show?'Hide loss tokens ◂':'Show loss tokens ▸';draw();};

  let raf=null;
  function reset(){stages.forEach(s=>s.classList.remove('lit'));}
  document.getElementById('rdPlay').onclick=()=>{
    reset();let i=0;cancelAnimationFrame(raf);let last=0;
    (function loop(ts){if(!last)last=ts;if(ts-last>360){if(i<stages.length){stages[i].classList.add('lit');i++;last=ts;}}if(i<stages.length)raf=requestAnimationFrame(loop);})(0);
  };
  document.getElementById('rdReset').onclick=()=>{cancelAnimationFrame(raf);reset();};
  // technique cards
  const techs=[
    {t:'KV Cache',d:'During generation, the keys and values of past tokens never change. The KV cache stores them so each new token only computes attention against cached K/V instead of recomputing the whole sequence — turning O(n²) per-step work into O(n).'},
    {t:'Flash Attention',d:'A memory-efficient exact attention algorithm. It computes softmax(QKᵀ)V in tiles that stay in fast on-chip SRAM, never materializing the full n×n score matrix in slow GPU memory — big speedups and far less memory for long sequences.'},
    {t:'MQA',d:'Multi-Query Attention: all query heads share a single key/value head. This shrinks the KV cache dramatically (one K and V instead of h of them), speeding up inference at a small quality cost.'},
    {t:'GQA',d:'Grouped-Query Attention: a middle ground between full multi-head and MQA. Heads are split into a few groups that each share K/V. Used by models like Llama 2/3 to balance speed and quality.'},
    {t:'MoE',d:'Mixture of Experts: replace the dense FFN with many expert FFNs and a router that activates only a few per token. You get a huge parameter count but a small per-token compute cost — more capacity, similar speed.'},
    {t:'Quantization',d:'Store weights (and sometimes activations) in low precision — int8, int4 — instead of 16/32-bit floats. Cuts memory and bandwidth several-fold so large models fit on smaller hardware, with minimal accuracy loss.'},
    {t:'vLLM',d:'A high-throughput serving engine. Its PagedAttention manages the KV cache like virtual memory (in pages), eliminating fragmentation and enabling continuous batching of many requests — dramatically higher throughput.'}
  ];
  const grid=document.getElementById('rdTags');const det=document.getElementById('rdTagDetail');
  techs.forEach(tc=>{
    const c=document.createElement('div');c.className='tag-card';
    c.innerHTML='<div class="t">'+tc.t+'</div>';
    c.style.cursor='pointer';
    c.onclick=()=>{det.innerHTML='<b>'+tc.t+'</b> &mdash; '+tc.d;
      grid.querySelectorAll('.tag-card').forEach(x=>x.style.borderColor='');c.style.borderColor='var(--amber)';};
    grid.appendChild(c);
  });
}
});
